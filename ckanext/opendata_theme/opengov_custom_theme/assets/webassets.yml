theme-css:
  output: opengov_custom_theme/%(version)s_theme.css
  contents:
    - css/keyboard-reorder.css

theme-js:
  filters: rjsmin
  output: opengov_custom_theme/%(version)s_theme.js
  extra:
    preload:
      - base/main
  contents:
    - js/theme.js
    - js/keyboard-reorder.js
    - js/data-dict-flash.js